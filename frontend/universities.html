<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Universities | UniSwap</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg custom-navbar sticky-top">

    <div class="container">

        <a class="navbar-brand d-flex align-items-center" href="index.html">

            <div class="logo-circle">

                <i class="bi bi-arrow-repeat"></i>

            </div>

            <span class="ms-2">UniSwap</span>

        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbar">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbar">

            <ul class="navbar-nav mx-auto">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="listings.html">Listings</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="categories.html">Categories</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="universities.html">Universities</a>
                </li>

            </ul>

            <div class="d-flex">

                <a href="login.html" class="btn login-btn me-2">
                    Login
                </a>

                <a href="register.html" class="btn register-btn">
                    Register
                </a>

            </div>

        </div>

    </div>

</nav>

<section class="container py-5">

    <div class="text-center mb-5">

        <h2>Universities</h2>

        <p class="text-muted">

            Manage universities available on UniSwap.

        </p>

    </div>

    <div class="card shadow-sm border-0 mb-5">

        <div class="card-body">

            <h4 class="mb-4">

                Add University

            </h4>

            <form id="universityForm">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            University Name

                        </label>

                        <input
                            type="text"
                            id="university_name"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            City

                        </label>

                        <input
                            type="text"
                            id="city"
                            class="form-control"
                            required>

                    </div>

                </div>

                <button class="btn register-btn">

                    Add University

                </button>

            </form>

        </div>

    </div>

    <div class="row" id="universityContainer">

    </div>

</section>

<!-- Edit Modal -->

<div class="modal fade" id="editUniversityModal" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Edit University

                </h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <form id="editUniversityForm">

                    <input
                        type="hidden"
                        id="edit_university_id">

                    <div class="mb-3">

                        <label>University Name</label>

                        <input
                            type="text"
                            id="edit_university_name"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>City</label>

                        <input
                            type="text"
                            id="edit_city"
                            class="form-control"
                            required>

                    </div>

                    <button class="btn register-btn w-100">

                        Update University

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<footer class="footer">

    <div class="container text-center">

        <p class="mb-0">

            © 2026 UniSwap

        </p>

    </div>

</footer>

<script src="javascript/universities.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
