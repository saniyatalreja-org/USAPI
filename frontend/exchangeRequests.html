<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg custom-navbar sticky-top">

<div class="container">

<a class="navbar-brand d-flex align-items-center" href="index.html">

<div class="logo-circle">

<i class="bi bi-arrow-repeat"></i>

</div>

<span class="ms-2">UniSwap</span>

</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="navbar">

<ul class="navbar-nav mx-auto">

<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

<li class="nav-item"><a class="nav-link active" href="exchangeRequests.html">Exchange Requests</a></li>

</ul>

</div>

</div>

</nav>

<section class="container py-5">

<div class="text-center mb-5">

<h2>Exchange Requests</h2>

<p class="text-muted">

Manage product exchange requests.

</p>

</div>

<div class="card shadow-sm border-0 mb-5">

<div class="card-body">

<h4 class="mb-4">Create Exchange Request</h4>

<form id="exchangeRequestForm">

<div class="row">

<div class="col-md-3 mb-3">

<label>Listing ID</label>

<input type="number" id="listing_id" class="form-control" required>

</div>

<div class="col-md-3 mb-3">

<label>Sender ID</label>

<input type="number" id="sender_id" class="form-control" required>

</div>

<div class="col-md-3 mb-3">

<label>Receiver ID</label>

<input type="number" id="receiver_id" class="form-control" required>

</div>

<div class="col-md-3 mb-3">

<label>Status</label>

<select id="status" class="form-select">

<option>Pending</option>
<option>Accepted</option>
<option>Rejected</option>

</select>

</div>

<div class="col-md-12 mb-3">

<label>Message</label>

<textarea id="message" class="form-control" required></textarea>

</div>

</div>

<button class="btn register-btn">

Send Request

</button>

</form>

</div>

</div>

<div class="row" id="exchangeRequestContainer"></div>

</section>

<!-- Edit Modal -->

<div class="modal fade" id="editExchangeModal" tabindex="-1">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5>Edit Exchange Request</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<form id="editExchangeForm">

<input type="hidden" id="edit_request_id">

<div class="mb-3">

<label>Message</label>

<textarea id="edit_message" class="form-control"></textarea>

</div>

<div class="mb-3">

<label>Status</label>

<select id="edit_status" class="form-select">

<option>Pending</option>
<option>Accepted</option>
<option>Rejected</option>

</select>

</div>

<button class="btn register-btn w-100">

Update Request

</button>

</form>

</div>

</div>

</div>

</div>

<footer class="footer">

<div class="container text-center">

<p class="mb-0">

© 2026 UniSwap

</p>

</div>

</footer>
