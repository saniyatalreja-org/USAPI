</head>

<body>

<div class="logo-circle">

</div>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="navbar">

<ul class="navbar-nav mx-auto">

<section class="container py-5">

<div class="text-center mb-5">

<h2>Messages</h2>

<p class="text-muted">

Send messages between UniSwap users.

</p>

</div>

<div class="card shadow-sm border-0 mb-5">

<div class="card-body">

<h4 class="mb-4">

Send Message

</h4>

<form id="messageForm">

<div class="row">

<div class="col-md-3 mb-3">

<label>Sender ID</label>

<input
type="number"
id="sender_id"
class="form-control"
required>

</div>

<div class="col-md-3 mb-3">

<label>Receiver ID</label>

<input
type="number"
id="receiver_id"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Message</label>

<input
type="text"
id="message"
class="form-control"
required>

</div>

</div>

<button class="btn register-btn">

Send Message

</button>

</form>

</div>

</div>

<div class="row" id="messageContainer"></div>

</section>

<!-- Edit Modal -->

<div class="modal fade" id="editMessageModal" tabindex="-1">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">

Edit Message

</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<form id="editMessageForm">

<input type="hidden" id="edit_message_id">

<div class="mb-3">

<label>Message</label>

<textarea
id="edit_message"
class="form-control"
required></textarea>

</div>

<button class="btn register-btn w-100">

Update Message

</button>

</form>

</div>

</div>

</div>

</div>

<footer class="footer">

<div class="container text-center">

<p class="mb-0">

© 2026 UniSwap

</p>

</div>

</footer>

<script src="javascript/messages.js"></script>
