<section class="container py-5">

<div class="text-center mb-5">

<h2>Project Requests</h2>

<p class="text-muted">

Find teammates for your university projects.

</p>

</div>

<div class="card shadow-sm border-0 mb-5">

<div class="card-body">

<h4 class="mb-4">

Create Project Request

</h4>

<form id="projectRequestForm">

<div class="row">

<div class="col-md-6 mb-3">

<label>Project Title</label>

<input
type="text"
id="project_title"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Category</label>

<input
type="text"
id="project_category"
class="form-control"
required>

</div>

<div class="col-md-12 mb-3">

<label>Description</label>

<textarea
id="description"
class="form-control"
required></textarea>

</div>

<div class="col-md-4 mb-3">

<label>Required Members</label>

<input
type="number"
id="required_members"
class="form-control"
required>

</div>

<div class="col-md-4 mb-3">

<label>Deadline</label>

<input
type="date"
id="deadline"
class="form-control"
required>

</div>

<div class="col-md-4 mb-3">

<label>Status</label>

<select
id="status"
class="form-select">

<option>Open</option>

<option>Closed</option>

</select>

</div>

</div>

<button class="btn register-btn">

Create Request

</button>

</form>

</div>

</div>

<div class="row" id="projectRequestContainer">

</div>

</section>

<!-- EDIT MODAL -->

<div class="modal fade" id="editProjectRequestModal" tabindex="-1">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5>Edit Project Request</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<form id="editProjectRequestForm">

<input type="hidden" id="edit_request_id">

<div class="mb-3">

<label>Project Title</label>

<input
type="text"
id="edit_project_title"
class="form-control">

</div>

<div class="mb-3">

<label>Category</label>

<input
type="text"
id="edit_project_category"
class="form-control">

</div>

<div class="mb-3">

<label>Description</label>

<textarea
id="edit_description"
class="form-control"></textarea>

</div>

<div class="mb-3">

<label>Required Members</label>

<input
type="number"
id="edit_required_members"
class="form-control">

</div>

<div class="mb-3">

<label>Deadline</label>

<input
type="date"
id="edit_deadline"
class="form-control">

</div>

<div class="mb-3">

<label>Status</label>

<select
id="edit_status"
class="form-select">

<option>Open</option>

<option>Closed</option>

</select>

</div>

<button class="btn register-btn w-100">

Update Request

</button>

</form>

</div>

</div>

</div>

</div>

<div class="container text-center">

<p class="mb-0">
