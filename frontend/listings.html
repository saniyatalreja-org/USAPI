    <section class="py-5">

        <div class="container">

            <div class="d-flex justify-content-between align-items-center mb-5">

                <h2>Available Listings</h2>

                <button
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#addListingModal">

                <i class="bi bi-plus-circle"></i>

                Add Listing

                </button>

            </div>

            <div class="row g-4" id="listingContainer">

            </div>

        </div>

    </section>
    <!-- Add Listing Modal -->
<div class="modal fade" id="addListingModal" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">Add New Listing</h5>

                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body">

                <form id="listingForm">

                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" id="title" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea id="description" class="form-control" rows="3" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Price</label>
                        <input type="number" id="price" class="form-control" required>
                    </div>

                    <div class="mb-3">
    <label class="form-label">Category</label>
    <select id="category_id" class="form-select">

        <option value="1">Books</option>
        <option value="2">Electronics</option>
        <option value="3">Gadgets</option>
        <option value="4">Accessories</option>
        <option value="5">Project Components</option>

    </select>
</div>

<div class="mb-3">
    <label class="form-label">Listing Type</label>
    <select id="listing_type" class="form-select">

        <option value="Sale">Sale</option>

    </select>
</div>

                    <div class="mb-3">
                        <label class="form-label">Condition</label>
                        <select id="condition" class="form-select">
                            <option>New</option>
                            <option>Like New</option>
                            <option>Good</option>
                            <option>Fair</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Location</label>
                        <input type="text" id="location" class="form-control">
                    </div>

                    <button class="btn btn-primary w-100">
                        Add Listing
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<!-- Edit Listing Modal -->
<div class="modal fade" id="editListingModal" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">Edit Listing</h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <form id="editListingForm">

                    <input type="hidden" id="edit_listing_id">
                    <input type="hidden" id="edit_category_id">

                    <div class="mb-3">

                        <label class="form-label">Title</label>

                        <input
                            type="text"
                            id="edit_title"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Description</label>

                        <textarea
                            id="edit_description"
                            class="form-control"
                            rows="3"
                            required></textarea>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Price</label>

                        <input
                            type="number"
                            id="edit_price"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Condition</label>

                        <select
                            id="edit_condition"
                            class="form-select">

                            <option>New</option>
                            <option>Like New</option>
                            <option>Good</option>
                            <option>Fair</option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">Location</label>

                        <input
                            type="text"
                            id="edit_location"
                            class="form-control"
                            required>

                    </div>

                    <button
                        class="btn btn-warning w-100">

                        Update Listing

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>
