    <link rel="stylesheet" href="css/style.css">

</head>

<nav class="navbar navbar-expand-lg custom-navbar sticky-top">

    <div class="container">

        <a class="navbar-brand d-flex align-items-center" href="index.html">

            <div class="logo-circle">

                <i class="bi bi-arrow-repeat"></i>

            </div>

            <span class="ms-2">UniSwap</span>

        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbar">

            <ul class="navbar-nav mx-auto">

                <li class="nav-item">

                <li class="nav-item">

            </ul>

<section class="container py-5">

    <div class="text-center mb-5">

        <h2>Reviews</h2>

        <p class="text-muted">
            View and manage user reviews.
        </p>

    </div>

    <div class="card shadow-sm border-0 mb-5">

        <div class="card-body">

            <h4 class="mb-4">Add Review</h4>

            <form id="reviewForm">

                <div class="row">

                    <div class="col-md-3 mb-3">

                        <label>Reviewer ID</label>

                        <input type="number" id="reviewer_id" class="form-control" required>

                    </div>

                    <div class="col-md-3 mb-3">

                        <label>Reviewed User ID</label>

                        <input type="number" id="reviewed_user_id" class="form-control" required>

                    </div>

                    <div class="col-md-2 mb-3">

                        <label>Rating</label>

                        <input type="number" min="1" max="5" id="rating" class="form-control" required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label>Comment</label>

                        <input type="text" id="comment" class="form-control" required>

                    </div>

                </div>

                <button class="btn register-btn">
                    Add Review
                </button>

            </form>

        </div>

    </div>

    <div class="row" id="reviewContainer"></div>

</section>

<!-- Edit Review Modal -->

<div class="modal fade" id="editReviewModal" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">Edit Review</h5>

                <button class="btn-close" data-bs-dismiss="modal"></button>

            </div>

            <div class="modal-body">

                <form id="editReviewForm">

                    <input type="hidden" id="edit_review_id">

                    <div class="mb-3">

                        <label>Rating</label>

                        <input
                            type="number"
                            min="1"
                            max="5"
                            id="edit_rating"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Comment</label>

                        <textarea
                            id="edit_comment"
                            class="form-control"
                            required></textarea>

                    </div>

                    <button class="btn register-btn w-100">

                        Update Review

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

<footer class="footer">

    <div class="container text-center">

        <p class="mb-0">© 2026 UniSwap</p>

    </div>

</footer>
