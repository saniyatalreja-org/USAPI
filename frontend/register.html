<section class="login-section">

<div class="container">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="login-card">

<h2 class="text-center mb-4">

Create Account

</h2>

<form id="registerForm">

<div class="mb-3">

<label>Full Name</label>

<input
type="text"
id="full_name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
id="email"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
id="password"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Phone</label>

<input
type="text"
id="phone"
class="form-control">

</div>

<div class="mb-3">

<label>Department</label>

<input
type="text"
id="department"
class="form-control">

</div>

<div class="mb-4">

<label>Batch</label>

<input
type="text"
id="batch"
class="form-control">

</div>

<button
type="submit"
class="btn btn-primary w-100">

Create Account

</button>

</form>

<p class="text-center mt-4">
