<!-- PAGE HEADER -->

<section class="container py-5">

    <div class="text-center mb-5">

        <h2>Transactions</h2>

        <p class="text-muted">

            View and manage all marketplace transactions.

        </p>

    </div>

    <!-- ADD TRANSACTION -->

    <div class="card shadow-sm border-0 mb-5">

        <div class="card-body">

            <h4 class="mb-4">

                Add Transaction

            </h4>

            <form id="transactionForm">

                <div class="row">

                    <div class="col-md-4 mb-3">

                        <label class="form-label">Listing ID</label>

                        <input
                            type="number"
                            id="listing_id"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">Buyer ID</label>

                        <input
                            type="number"
                            id="buyer_id"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">Seller ID</label>

                        <input
                            type="number"
                            id="seller_id"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">Amount</label>

                        <input
                            type="number"
                            id="amount"
                            class="form-control"
                            required>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">Payment Method</label>

                        <select
                            id="payment_method"
                            class="form-select">

                            <option>Cash</option>
                            <option>Bank Transfer</option>
                            <option>EasyPaisa</option>
                            <option>JazzCash</option>

                        </select>

                    </div>

                    <div class="col-md-4 mb-3">

                        <label class="form-label">Transaction Type</label>

                        <select
                            id="transaction_type"
                            class="form-select">

                            <option>Sale</option>
                            <option>Exchange</option>

                        </select>

                    </div>

                </div>

                <button
                    class="btn register-btn">

                    Add Transaction

                </button>

            </form>

        </div>

    </div>

    <!-- TRANSACTIONS -->

    <div class="row" id="transactionContainer">

    </div>

</section>

<!-- EDIT TRANSACTION MODAL -->

<div class="modal fade" id="editTransactionModal" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Edit Transaction

                </h5>

                <button
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <form id="editTransactionForm">

                    <input
                        type="hidden"
                        id="edit_transaction_id">

                    <div class="mb-3">

                        <label>Amount</label>

                        <input
                            type="number"
                            id="edit_amount"
                            class="form-control"
                            required>

                    </div>

                    <div class="mb-3">

                        <label>Payment Method</label>

                        <select
                            id="edit_payment_method"
                            class="form-select">

                            <option>Cash</option>
                            <option>Bank Transfer</option>
                            <option>EasyPaisa</option>
                            <option>JazzCash</option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label>Status</label>

                        <select
                            id="edit_status"
                            class="form-select">

                            <option>Pending</option>
                            <option>Completed</option>
                            <option>Cancelled</option>

                        </select>

                    </div>

                    <button
                        class="btn register-btn w-100">

                        Update Transaction

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>
